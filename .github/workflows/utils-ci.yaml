name: Utils CI

on:
  push:
    branches:
      - main
    paths:
      - "utils/**"
  pull_request:
    branches:
      - main
    paths:
      - "utils/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Pre-build devShell
        run: nix build --no-link '.#devShells.'$(nix eval --impure --raw --expr builtins.currentSystem)'.default'

      - name: Check formatting
        shell: nix develop -c bash -e {0}
        run: |
          make fmt NAME=utils
          changed=$(git diff --name-only -- 'utils/*.sh')
          if [ -n "$changed" ]; then
            echo "$changed" | while IFS= read -r file; do
              echo "::error file=$file::Needs formatting. Run 'make fmt NAME=utils'"
            done
            exit 1
          fi

      - name: Lint
        shell: nix develop -c bash -e {0}
        run: |
          set -o pipefail
          make lint NAME=utils SHELLCHECK_FORMAT="-f gcc" 2>&1 | \
            sed -E 's/^([^:]+):([0-9]+):([0-9]+): (error|warning): (.*)$/::\4 file=\1,line=\2,col=\3::\5/; s/^([^:]+):([0-9]+):([0-9]+): (info): (.*)$/::notice file=\1,line=\2,col=\3::\5/'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Pre-build devShell
        run: nix build --no-link '.#devShells.'$(nix eval --impure --raw --expr builtins.currentSystem)'.default'

      - name: Run tests
        shell: nix develop -c bash -e {0}
        run: make test NAME=utils
