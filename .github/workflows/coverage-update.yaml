name: Update Coverage

on:
  workflow_dispatch:
    inputs:
      scripts:
        description: 'Scripts to update (comma-separated, e.g., "cz,jwt" or "all")'
        required: true
        default: "all"

jobs:
  validate:
    name: Validate input
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.validate.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate scripts
        id: validate
        run: |
          input="${{ github.event.inputs.scripts }}"

          # Get all available scripts
          available=$(find scripts -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)

          if [ "$input" = "all" ]; then
            scripts=$(echo "$available" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # Parse comma-separated input
            IFS=',' read -ra requested <<< "$input"
            valid=()
            for script in "${requested[@]}"; do
              script=$(echo "$script" | xargs) # trim whitespace
              if echo "$available" | grep -qx "$script"; then
                valid+=("$script")
              else
                echo "::error::Unknown script: $script"
                echo "Available scripts: $available"
                exit 1
              fi
            done
            scripts=$(printf '%s\n' "${valid[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
          echo "Will update coverage for: $scripts"

  coverage:
    name: ${{ matrix.script }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.validate.outputs.scripts) }}
    uses: ./.github/workflows/_template.scripts-ci.yaml
    with:
      script: ${{ matrix.script }}

  update-gist:
    name: Update gist
    needs: [validate, coverage]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false

      - name: Fetch baseline coverage from gist
        id: baseline
        env:
          GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
        run: |
          if [ -n "$GIST_ID" ]; then
            curl -sf "https://gist.githubusercontent.com/raw/${GIST_ID}/coverage.json" -o baseline.json || echo '{}' > baseline.json
          else
            echo '{}' > baseline.json
          fi
          cat baseline.json

      - name: Collect coverage data
        id: collect
        run: |
          scripts='${{ needs.validate.outputs.scripts }}'
          new_coverage="{}"

          for script in $(echo "$scripts" | jq -r '.[]'); do
            coverage_file="coverage-artifacts/coverage-${script}/scriptorium [specfiles]/coverage.json"
            if [ -f "$coverage_file" ]; then
              pct=$(jq -r '.percent_covered' "$coverage_file")
            else
              coverage_file=$(find "coverage-artifacts/coverage-${script}" -name 'coverage.json' 2>/dev/null | head -1)
              if [ -n "$coverage_file" ]; then
                pct=$(jq -r '.percent_covered' "$coverage_file")
              else
                echo "::warning::No coverage data for $script"
                continue
              fi
            fi

            echo "$script: ${pct}%"
            new_coverage=$(echo "$new_coverage" | jq --arg s "$script" --argjson c "$pct" '.[$s] = {coverage: $c}')
          done

          echo "new_coverage<<EOF" >> "$GITHUB_OUTPUT"
          echo "$new_coverage" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update coverage gist
        env:
          GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.COVERAGE_GIST_TOKEN }}
        run: |
          if [ -z "$GIST_ID" ] || [ -z "$GIST_TOKEN" ]; then
            echo "::error::COVERAGE_GIST_ID or COVERAGE_GIST_TOKEN not configured"
            exit 1
          fi

          new_coverage='${{ steps.collect.outputs.new_coverage }}'
          merged=$(jq -s '.[0] * .[1]' baseline.json <(echo "$new_coverage"))

          echo "Updating gist with:"
          echo "$merged" | jq .

          payload=$(jq -n --arg content "$merged" '{"files": {"coverage.json": {"content": $content}}}')
          curl -sf -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/${GIST_ID}" \
            -d "$payload"

          echo "Gist updated successfully"
