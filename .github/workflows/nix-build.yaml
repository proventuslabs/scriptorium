name: Nix Build

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - "utils/**"
      - "Makefile"
  pull_request:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - "utils/**"
      - "Makefile"

jobs:
  build:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [cz, dotenv, jwt, theme, default]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Build
        run: nix build .#${{ matrix.package }} -L

      - name: Verify output
        if: matrix.package != 'default'
        run: |
          bin="./result/bin/${{ matrix.package }}"
          size=$(wc -c < "$bin")

          if [ "$size" -eq 0 ]; then
            echo "::error::${{ matrix.package }} binary is 0 bytes"
            exit 1
          fi

          echo "${{ matrix.package }}: $size bytes, OK"
