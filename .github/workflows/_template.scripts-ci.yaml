name: "[TEMPLATE] Script CI"

on:
  workflow_call:
    inputs:
      script:
        required: true
        type: string
        description: The script name to run CI for

jobs:
  layout-check:
    name: Layout check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Verify script layout
        run: |
          script="${{ inputs.script }}"
          script_dir="scripts/${script}"
          errors=0

          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error file=$1::Missing required file: $1"
              errors=$((errors + 1))
            fi
          }

          check_integration() {
            local file="$1" pattern="$2" desc="$3"
            if ! grep -q "$pattern" "$file"; then
              echo "::error file=$file::Missing ${desc} in ${file}"
              errors=$((errors + 1))
            fi
          }

          # Required script files
          check_file "${script_dir}/main.sh"
          check_file "${script_dir}/options.sh"
          check_file "${script_dir}/default.nix"
          check_file "${script_dir}/main_spec.sh"
          check_file "${script_dir}/docs/${script}.adoc"
          check_file "${script_dir}/completions/${script}.bash"
          check_file "${script_dir}/completions/_${script}"

          # Required integration entries
          check_integration "release-please-config.json" "\"scripts/${script}\"" "package entry"
          check_integration "flake.nix" "${script}" "script import"
          check_integration "README.md" "${script}" "script entry"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Layout check failed with ${errors} error(s)."
            echo "See CONTRIBUTING.md for required script structure."
            exit 1
          fi
          echo "Layout check passed."
        shell: bash

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Pre-build devShell
        run: nix build --no-link '.#devShells.'$(nix eval --impure --raw --expr builtins.currentSystem)'.default'

      - name: Check formatting
        shell: nix develop -c bash -e {0}
        run: |
          make fmt NAME=${{ inputs.script }}
          changed=$(git diff --name-only -- 'scripts/${{ inputs.script }}/*.sh')
          if [ -n "$changed" ]; then
            echo "$changed" | while IFS= read -r file; do
              echo "::error file=$file::Needs formatting. Run 'make fmt NAME=${{ inputs.script }}'"
            done
            exit 1
          fi

      - name: Lint
        shell: nix develop -c bash -e {0}
        run: |
          set -o pipefail
          make lint NAME=${{ inputs.script }} SHELLCHECK_FORMAT="-f gcc" 2>&1 | \
            sed -E 's/^([^:]+):([0-9]+):([0-9]+): (error|warning): (.*)$/::\4 file=\1,line=\2,col=\3::\5/; s/^([^:]+):([0-9]+):([0-9]+): (info): (.*)$/::notice file=\1,line=\2,col=\3::\5/'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Pre-build devShell
        run: nix build --no-link '.#devShells.'$(nix eval --impure --raw --expr builtins.currentSystem)'.default'

      - name: Run tests
        shell: nix develop -c bash -e {0}
        run: make test NAME=${{ inputs.script }}

      - name: Extract coverage
        id: coverage
        run: |
          coverage_file=$(find coverage -name 'coverage.json' -path '*/scriptorium*' 2>/dev/null | head -1)
          if [ -n "$coverage_file" ]; then
            percent=$(jq -r '.percent_covered' "$coverage_file")
            echo "percent=$percent" >> "$GITHUB_OUTPUT"
            echo "Coverage for ${{ inputs.script }}: ${percent}%"
          else
            echo "percent=" >> "$GITHUB_OUTPUT"
            echo "No coverage data found"
          fi

      - name: Upload coverage data
        if: steps.coverage.outputs.percent != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.script }}
          path: |
            coverage/*/coverage.json
          retention-days: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Build
        run: nix build .#${{ inputs.script }} -L

      - name: Verify output
        run: |
          bin="./result/bin/${{ inputs.script }}"
          size=$(wc -c < "$bin")

          if [ "$size" -eq 0 ]; then
            echo "::error::${{ inputs.script }} binary is 0 bytes"
            exit 1
          fi

          echo "${{ inputs.script }}: $size bytes, OK"

      - name: Verify artifacts are up to date
        run: |
          # Compare nix output against committed dist/ (skip shebang line, patched by nix)
          built="./result/bin/${{ inputs.script }}"
          committed="dist/${{ inputs.script }}/bin/${{ inputs.script }}"

          if ! diff <(tail -n +2 "$built") <(tail -n +2 "$committed"); then
            echo "::error file=$committed::Artifact out of sync with source. Run 'make build NAME=${{ inputs.script }}' and commit."
            exit 1
          fi

  completions-sync:
    name: Completions sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Pre-build devShell
        run: nix build --no-link '.#devShells.'$(nix eval --impure --raw --expr builtins.currentSystem)'.default'

      - name: Check completions match options.sh
        shell: nix develop -c bash -e {0}
        run: ./utils/check-completions.sh scripts/${{ inputs.script }}
