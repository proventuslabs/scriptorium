name: Script CI

on:
  workflow_call:
    inputs:
      script:
        required: true
        type: string
        description: The script name to run CI for

jobs:
  enforce-specs:
    name: Enforce spec files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for missing spec files
        run: |
          script_dir="scripts/${{ inputs.script }}"

          # Check if main.sh was added in this PR
          added_files=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD)
          if echo "$added_files" | grep -q "^${script_dir}/main\.sh$"; then
            # New script - check for spec file
            if ! find "$script_dir" -name '*_spec.sh' -type f | grep -q .; then
              echo "::error file=${script_dir}/main.sh::New script missing spec file. Add ${script_dir}/${{ inputs.script }}_spec.sh"
              echo ""
              echo "New script is missing spec file."
              exit 1
            fi
          fi
          echo "Spec file check passed."
        shell: bash

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Check formatting
        run: |
          nix develop --command make fmt-script NAME=${{ inputs.script }}
          changed=$(git diff --name-only -- 'scripts/${{ inputs.script }}/*.sh')
          if [ -n "$changed" ]; then
            echo "$changed" | while IFS= read -r file; do
              echo "::error file=$file::Needs formatting. Run 'make fmt'"
            done
            exit 1
          fi

      - name: Lint
        run: |
          set -o pipefail
          nix develop --command make lint-script NAME=${{ inputs.script }} SHELLCHECK_FORMAT="-f gcc" 2>&1 | \
            sed -E 's/^([^:]+):([0-9]+):([0-9]+): (error|warning): (.*)$/::\4 file=\1,line=\2,col=\3::\5/; s/^([^:]+):([0-9]+):([0-9]+): (info): (.*)$/::notice file=\1,line=\2,col=\3::\5/'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Run tests
        run: nix develop --command make test-script NAME=${{ inputs.script }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Build script
        run: nix develop --command make build-script NAME=${{ inputs.script }}

      - name: Verify artifacts are up to date
        run: |
          changed_files=$(git diff --name-only bin/${{ inputs.script }} man/ completions/)
          if [ -n "$changed_files" ]; then
            echo "$changed_files" | while IFS= read -r file; do
              echo "::error file=$file::Artifact out of sync with source. Run 'make build-script NAME=${{ inputs.script }}' and commit."
            done
            echo ""
            echo "❌ Committed artifacts don't match source."
            exit 1
          fi
          echo "✅ Artifacts are up to date."
