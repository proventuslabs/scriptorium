name: Scripts CI

on:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/**"
  workflow_dispatch:
    inputs:
      scripts:
        description: 'Scripts to run CI for (comma-separated, e.g., "cz,jwt" or "all")'
        required: true
        default: "all"

# Serialize gist updates to prevent race conditions when multiple PRs merge
concurrency:
  group: scripts-ci-coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.build-matrix.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          list-files: json
          filters: |
            scripts:
              - 'scripts/**'

      - name: Build script matrix
        id: build-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: validate and use input
            input="${{ github.event.inputs.scripts }}"
            available=$(find scripts -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)

            if [ "$input" = "all" ]; then
              scripts=$(echo "$available" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              IFS=',' read -ra requested <<< "$input"
              valid=()
              for script in "${requested[@]}"; do
                script=$(echo "$script" | xargs)
                if echo "$available" | grep -qx "$script"; then
                  valid+=("$script")
                else
                  echo "::error::Unknown script: $script"
                  echo "Available scripts: $available"
                  exit 1
                fi
              done
              scripts=$(printf '%s\n' "${valid[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          elif [ "${{ steps.filter.outputs.scripts }}" = "true" ]; then
            changed='${{ steps.filter.outputs.scripts_files }}'
            # Only extract from paths with 3+ components (scripts/name/file) to exclude files directly in scripts/
            scripts=$(echo "$changed" | jq -r '.[]' | grep -E '^scripts/[^/]+/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            scripts='[]'
          fi
          echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
          echo "Scripts: $scripts"

  completions-sync:
    name: Completions sync
    needs: detect-changes
    if: needs.detect-changes.outputs.scripts != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Check completions match options.sh
        run: |
          scripts='${{ needs.detect-changes.outputs.scripts }}'
          # Convert JSON array to space-separated paths: ["cz","jwt"] -> scripts/cz scripts/jwt
          script_dirs=$(echo "$scripts" | jq -r '.[] | "scripts/\(.)"' | tr '\n' ' ')
          echo "Checking: $script_dirs"
          nix develop --command ./utils/check-completions.sh $script_dirs

  ci:
    name: ${{ matrix.script }}
    needs: detect-changes
    if: needs.detect-changes.outputs.scripts != '[]'
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.detect-changes.outputs.scripts) }}
    uses: ./.github/workflows/_template.scripts-ci.yaml
    with:
      script: ${{ matrix.script }}

  coverage-report:
    name: Coverage report
    needs: [detect-changes, ci]
    if: always() && needs.detect-changes.outputs.scripts != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false

      - name: Fetch baseline coverage from gist
        id: baseline
        env:
          GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
        run: |
          if [ -n "$GIST_ID" ]; then
            curl -sf "https://gist.githubusercontent.com/raw/${GIST_ID}/coverage.json" -o baseline.json || echo '{}' > baseline.json
          else
            echo '{}' > baseline.json
          fi
          cat baseline.json

      - name: Generate coverage report
        id: report
        run: |
          scripts='${{ needs.detect-changes.outputs.scripts }}'

          # Build coverage table
          table="| Script | Coverage | Change |"
          table+="\n|--------|----------|--------|"

          new_coverage="{}"

          for script in $(echo "$scripts" | jq -r '.[]'); do
            coverage_file="coverage-artifacts/coverage-${script}/scriptorium [specfiles]/coverage.json"
            if [ -f "$coverage_file" ]; then
              new_pct=$(jq -r '.percent_covered' "$coverage_file")
            else
              # Try alternate path
              coverage_file=$(find "coverage-artifacts/coverage-${script}" -name 'coverage.json' 2>/dev/null | head -1)
              if [ -n "$coverage_file" ]; then
                new_pct=$(jq -r '.percent_covered' "$coverage_file")
              else
                new_pct=""
              fi
            fi

            old_pct=$(jq -r --arg s "$script" '.[$s].coverage // empty' baseline.json)

            if [ -n "$new_pct" ]; then
              new_coverage=$(echo "$new_coverage" | jq --arg s "$script" --argjson c "$new_pct" '.[$s] = {coverage: $c}')

              if [ -n "$old_pct" ]; then
                delta=$(echo "$new_pct - $old_pct" | bc)
                if (( $(echo "$delta > 0" | bc -l) )); then
                  change="+${delta}% ⬆️"
                elif (( $(echo "$delta < 0" | bc -l) )); then
                  change="${delta}% ⬇️"
                else
                  change="—"
                fi
                table+="\n| ${script} | ${old_pct}% → ${new_pct}% | ${change} |"
              else
                table+="\n| ${script} | — → ${new_pct}% | 🆕 |"
              fi
            else
              table+="\n| ${script} | ⚠️ No coverage data | — |"
            fi
          done

          echo "table<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$table" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "new_coverage<<EOF" >> "$GITHUB_OUTPUT"
          echo "$new_coverage" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ## 📊 Coverage Report

            ${{ steps.report.outputs.table }}

      - name: Update coverage gist
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.COVERAGE_GIST_TOKEN }}
        run: |
          if [ -z "$GIST_ID" ] || [ -z "$GIST_TOKEN" ]; then
            echo "::warning::COVERAGE_GIST_ID or COVERAGE_GIST_TOKEN not configured, skipping gist update"
            exit 0
          fi

          # Merge new coverage into baseline
          new_coverage='${{ steps.report.outputs.new_coverage }}'
          merged=$(jq -s '.[0] * .[1]' baseline.json <(echo "$new_coverage"))

          # Update gist
          payload=$(jq -n --arg content "$merged" '{"files": {"coverage.json": {"content": $content}}}')
          curl -sf -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/${GIST_ID}" \
            -d "$payload"

          echo "Updated gist with new coverage data"
